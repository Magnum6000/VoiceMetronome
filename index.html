<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>棒読みメトロノーム</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
            background-color: #ffffff;
        }
        .container {
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        /* 拍のインジケーターを一番上に配置 */
        .indicators {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .dot {
            width: 30px;
            height: 30px;
            border: 3px solid #1095c1;
            border-radius: 50%;
            background-color: transparent;
            transition: background-color 0.1s;
        }
        .dot.active {
            background-color: #1095c1;
        }
        /* BPM表示 */
        .bpm-display {
            font-size: 80px;
            font-weight: bold;
            margin-bottom: 10px;
            line-height: 1;
        }
        .bpm-unit {
            font-size: 20px;
            color: #666;
        }
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }
        input[type="range"] {
            flex-grow: 1;
            cursor: pointer;
        }
        .step-btn {
            background: none;
            border: none;
            font-size: 40px;
            color: #1095c1;
            cursor: pointer;
        }
        #startBtn {
            width: 80px;
            height: 80px;
            background-color: #1095c1;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto;
        }
        .icon {
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 15px 0 15px 25px;
            border-color: transparent transparent transparent #ffffff;
            margin-left: 5px;
        }
        .icon.playing {
            width: 24px;
            height: 30px;
            border: none;
            margin-left: 0;
            background: linear-gradient(90deg, white 35%, transparent 35%, transparent 65%, white 65%);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="indicators">
        <div class="dot" id="dot1"></div>
        <div class="dot" id="dot2"></div>
        <div class="dot" id="dot3"></div>
        <div class="dot" id="dot4"></div>
    </div>

    <div class="bpm-display">
        <span id="bpmValue">100</span>
        <span class="bpm-unit">BPM</span>
    </div>

    <div class="controls">
        <button class="step-btn" id="minusBtn">−</button>
        <input type="range" id="bpmInput" min="40" max="240" value="100">
        <button class="step-btn" id="plusBtn">+</button>
    </div>

    <button id="startBtn">
        <div id="btnIcon" class="icon"></div>
    </button>
</div>

<script src="script.js"></script>
</body>
</html>
